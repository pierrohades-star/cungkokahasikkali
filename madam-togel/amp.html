<style amp-custom> :root {
	--bg: #000000;
	--text: #fbf6f6;
	--neon-blue: #ffbc00;
	--neon-blue-light: #ffbc00;
	--neon-pulse: #ffffff
}

* {
	box-sizing: border-box
}

html,
body {
	margin: 0;
	height: 100%
}

body {
	font-family: 'Inter', sans-serif;
	color: var(--text);
	background: var(--bg);
	min-height: 100vh;
	display: flex;
	justify-content: center;
	align-items: flex-start;
	padding: 16px
}

.shell {
	max-width: 520px;
	width: 100%;
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: 16px
}

.header {
	display: flex;
	justify-content: center;
	margin-bottom: 0
}

.logo {
	border-radius: 8px
}

.marquee-wrapper {
	width: 100%;
	background: #000;
	border-top: 2px groove #ffbc00;
	border-bottom: 2px groove #ffbc00;
	overflow: hidden;
	padding: 8px 0
}

.marquee-text {
	display: inline-block;
	white-space: nowrap;
	color: #fff;
	font-size: 13px;
	font-weight: bold;
	padding-left: 100%;
	animation: marquee 12s linear infinite
}

@keyframes marquee {
	0% {
		transform: translateX(0)
	}

	100% {
		transform: translateX(-100%)
	}
}

.card {
	position: relative;
	background: linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.03));
	border: 3px solid #ffbc00;
	border-radius: 18px;
	box-shadow: 0 0 30px #ffbc00, inset 0 0 12px #ffbc00, 0 10px 50px rgba(0, 0, 0, 0.6);
	overflow: hidden;
	width: 100%;
	padding: 20px
}

.card:hover {
	box-shadow: 0 0 50px #ffbc00, inset 0 0 20px #ffbc00, 0 10px 60px rgba(0, 0, 0, 0.7);
	transform: scale(1.01)
}

.card::before {
	content: "";
	position: absolute;
	top: -50%;
	left: -50%;
	width: 200%;
	height: 200%;
	background: radial-gradient(circle, #ffbc00, transparent 70%);
	animation: neonWave 6s linear infinite;
	filter: blur(25px);
	z-index: 0
}

@keyframes neonWave {
	0% {
		transform: translateX(-50%) translateY(-50%) rotate(0deg)
	}

	100% {
		transform: translateX(-50%) translateY(-50%) rotate(360deg)
	}
}

.hero {
	display: flex;
	flex-direction: column;
	gap: 16px;
	align-items: center;
	position: relative;
	z-index: 1
}

.hero-img {
	border-radius: 14px;
	width: 100%;
	height: auto
}

.cta {
	display: flex;
	gap: 12px;
	width: 100%;
	justify-content: center;
	flex-wrap: wrap;
	position: relative;
	z-index: 1
}

.btn {
	flex: 1 1 45%;
	display: inline-block;
	text-decoration: none;
	text-align: center;
	padding: 14px 16px;
	border-radius: 12px;
	font-weight: 700;
	letter-spacing: .3px;
	border: 2px solid transparent;
	transition: all .25s ease;
	position: relative;
	overflow: hidden;
	color: #fff;
	background: #000;
	z-index: 1
}

.btn::before {
	content: "";
	position: absolute;
	top: -3px;
	left: -3px;
	right: -3px;
	bottom: -3px;
	background: conic-gradient(from 0deg, var(--neon-blue), var(--neon-blue-light), var(--neon-blue));
	border-radius: 14px;
	z-index: -1;
	filter: blur(8px);
	animation: rotateBorder 2.5s linear infinite
}

.btn::after {
	content: "";
	position: absolute;
	top: 3px;
	left: 3px;
	right: 3px;
	bottom: 3px;
	background: #000;
	border-radius: 10px;
	z-index: -1
}

.btn:hover {
	animation: glowPulse 1s infinite;
	transform: translateY(-2px)
}

@keyframes rotateBorder {
	to {
		transform: rotate(360deg)
	}
}

@keyframes glowPulse {
	0% {
		box-shadow: 0 0 30px var(--neon-blue), 0 0 60px var(--neon-blue-light)
	}

	50% {
		box-shadow: 0 0 60px var(--neon-blue-light), 0 0 120px var(--neon-pulse)
	}

	100% {
		box-shadow: 0 0 30px var(--neon-blue), 0 0 60px var(--neon-blue-light)
	}
}

.section-buttons {
	display: flex;
	flex-direction: column;
	gap: 12px;
	width: 100%
}

.badge-container {
	display: flex;
	gap: 8px;
	flex-wrap: wrap;
	justify-content: center
}

.badge {
	flex: 1 1 30%;
	display: inline-block;
	text-decoration: none;
	text-align: center;
	padding: 10px 12px;
	border-radius: 10px;
	font-weight: 700;
	letter-spacing: .2px;
	border: 2px solid transparent;
	transition: all .25s ease;
	position: relative;
	overflow: hidden;
	color: #fff;
	background: #000;
	z-index: 1;
	font-size: 12px
}

.badge::before {
	content: "";
	position: absolute;
	top: -3px;
	left: -3px;
	right: -3px;
	bottom: -3px;
	background: conic-gradient(from 0deg, var(--neon-blue), var(--neon-blue-light), var(--neon-blue));
	border-radius: 12px;
	z-index: -1;
	filter: blur(8px);
	animation: rotateBorder 3s linear infinite
}

.badge::after {
	content: "";
	position: absolute;
	top: 3px;
	left: 3px;
	right: 3px;
	bottom: 3px;
	background: #000;
	border-radius: 8px;
	z-index: -1
}

.badge:hover {
	animation: glowPulse 1.2s infinite;
	transform: scale(1.05)
}

	z-index: 1
